
<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Alfa Security - Elite Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --gold-glow: rgba(212, 175, 55, 0.3);
            --red-fire: #ef4444;
            --red-glow: rgba(239, 68, 68, 0.4);
            --bg-deep: #030303;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            color: #ffffff;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            touch-action: manipulation;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        
        /* High-End Liquid Background */
        .liquid-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            overflow: hidden;
            background: radial-gradient(circle at 50% -10%, #111 0%, #000 100%);
        }
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.2;
            animation: moveBlob 25s infinite alternate ease-in-out;
        }
        .blob-1 { width: 400px; height: 400px; background: var(--gold); top: -10%; left: -10%; }
        .blob-2 { width: 500px; height: 500px; background: var(--red-fire); bottom: -15%; right: -10%; animation-delay: -7s; }
        .blob-3 { width: 300px; height: 300px; background: #3b82f6; top: 35%; left: 50%; animation-delay: -12s; opacity: 0.1; }

        @keyframes moveBlob {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            100% { transform: translate(60px, 80px) scale(1.15) rotate(90deg); }
        }

        /* Luxury Liquid Glass Morphism */
        .liquid-glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(35px) saturate(200%);
            -webkit-backdrop-filter: blur(35px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(255, 255, 255, 0.02);
        }

        .btn-elite {
            background: linear-gradient(135deg, #f9f295 0%, #e0aa3e 40%, #b88a44 70%, #8a6e2f 100%);
            color: #000;
            font-weight: 900;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 12px 24px rgba(212, 175, 55, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .btn-elite:active {
            transform: scale(0.96);
            filter: brightness(0.85);
            box-shadow: 0 4px 10px rgba(212, 175, 55, 0.1);
        }

        .gold-text-elite {
            background: linear-gradient(to bottom, #f9f295 0%, #e0aa3e 50%, #8a6e2f 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        .step-transition {
            animation: stepFadeIn 0.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }
        @keyframes stepFadeIn {
            from { opacity: 0; transform: scale(0.97) translateY(15px); filter: blur(8px); }
            to { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
        }

        /* iOS/Samsung specific input resets */
        input {
            -webkit-appearance: none;
            outline: none;
        }
        
        ::-webkit-scrollbar { width: 0px; height: 0px; }
    </style>
<script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.564.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react/": "https://esm.sh/react@^19.2.4/",
    "jspdf-autotable": "https://esm.sh/jspdf-autotable@^5.0.7",
    "jspdf": "https://esm.sh/jspdf@^4.1.0"
  }
}
</script>
</head>
<body>
    <div class="liquid-container">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
    <div id="root"></div>
</body>
</html>
